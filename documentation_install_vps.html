    <script>
        const docsData = {
            instalasi: `
# Panduan Instalasi & Deployment

Langkah-langkah menyiapkan lingkungan server untuk menjalankan aplikasi **AI Mermaid JS** menggunakan Virtual Environment dan PM2.

## 1. Persiapan & Instalasi
Jalankan perintah berikut di terminal server Anda:

\`\`\`bash
# Clone repositori dari GitHub
git clone https://github.com/unobengkel/aimermaidjs.git
cd aimermaidjs

# Membuat Virtual Environment (VENV)
python3 -m venv venv

# Aktivasi VENV
source venv/bin/activate

# Install semua dependensi
pip install -r requirements.txt
\`\`\`

## 2. Pengujian Lokal
Gunakan perintah ini untuk memastikan aplikasi berjalan (Mode Dev):

\`\`\`bash
uvicorn main:app --host 0.0.0.0 --port 8000 --reload
\`\`\`
> **Note:** Ketik \`deactivate\` untuk keluar dari virtual environment setelah selesai mencoba.

## 3. Deployment Produksi dengan PM2
Agar aplikasi berjalan otomatis di background, gunakan **PM2**.

**Perintah Start:**
\`\`\`bash
pm2 start venv/bin/python --name "mermaid-api" -- -m uvicorn main:app --host 0.0.0.0 --port 8000
\`\`\`

**Manajemen PM2:**
- **Log:** \`pm2 logs mermaid-api\`
- **Status:** \`pm2 status\`
- **Simpan Konfigurasi:** \`pm2 save\`
            `,

            keterangan_instalasi: `
# Keterangan Instalasi Server

Laporan status instalasi aplikasi pada server produksi.

### Informasi Deployment
- **Lokasi:** Sumopod
- **Tanggal:** 14 April 2026
- **Jam:** 19:02 WIB
- **Status:** ✅ Sukses

### Detail Instalasi
Berikut adalah catatan teknis mengenai langkah yang telah diselesaikan:
1. **Environment:** Berhasil menggunakan Python Virtual Environment (\`venv\`) untuk isolasi library.
2. **Dependensi:** Berhasil melakukan penambahan paket-paket melalui \`requirements.txt\`.
3. **Pustaka LangChain:** Ditemukan kendala pada paket \`langchain_text_splitters\` yang memerlukan penyesuaian import manual di file \`rag_handler.py\`.

> Catatan: Untuk detail perbaikan error LangChain, silakan merujuk pada menu **Troubleshooting > ModuleNotFoundError**.
            `,

            error_module: `
# Solusi: ModuleNotFoundError

Kesalahan umum yang terjadi karena perbedaan struktur paket pada **LangChain v1.x**. Meskipun sudah terinstal, aplikasi mungkin gagal mengenali modul karena namespace yang berubah.

## Deskripsi Error
\`\`\`text
ModuleNotFoundError: No module named 'langchain.text_splitter'
\`\`\`

## Langkah Perbaikan

### 1. Perbarui Import di rag_handler.py
Ubah baris ke-7 pada file tersebut:

**Sebelumnya:**
\`\`\`python
from langchain.text_splitter import RecursiveCharacterTextSplitter
\`\`\`

**Sesudah:**
\`\`\`python
from langchain_text_splitters import RecursiveCharacterTextSplitter
\`\`\`

### 2. Gunakan Prefix Python -m
Jika masih bermasalah saat menjalankan secara manual, gunakan cara pemanggilan modul:

\`\`\`bash
python -m uvicorn main:app --host 0.0.0.0 --port 8000
\`\`\`

> **Informasi:** Metode \`python -m\` menjamin binary yang dipanggil sesuai dengan interpreter di dalam Virtual Environment Anda.
            `
        };

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const menuIcon = document.getElementById('menu-icon');
        const closeIcon = document.getElementById('close-icon');
        const contentArea = document.getElementById('content-area');
        const breadcrumbActive = document.getElementById('breadcrumb-active');

        function loadPage(pageKey, element = null) {
            // Render Content
            contentArea.innerHTML = marked.parse(docsData[pageKey]);
            Prism.highlightAll();

            // Update UI State
            if (element) {
                document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
                breadcrumbActive.textContent = element.textContent.trim();
            }

            // Mobile specific closing
            if (window.innerWidth < 1024) {
                toggleMobileMenu(false);
            }
            
            // Scroll reset
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleMobileMenu(isOpen = null) {
            const isNowOpen = isOpen !== null ? isOpen : sidebar.classList.contains('-translate-x-full');
            
            if (isNowOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('pointer-events-none', 'opacity-0');
                overlay.classList.add('opacity-100');
                menuIcon.classList.add('hidden');
                closeIcon.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0', 'pointer-events-none');
                overlay.classList.remove('opacity-100');
                menuIcon.classList.remove('hidden');
                closeIcon.classList.add('hidden');
            }
        }

        mobileBtn.addEventListener('click', () => toggleMobileMenu());
        overlay.addEventListener('click', () => toggleMobileMenu(false));

        // Initial Load
        window.onload = () => {
            loadPage('instalasi');
        };
    </script>
